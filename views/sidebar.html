{{ define "sidebar" }}
<div class="p-6 border-b border-[#23314B] flex items-center justify-between shrink-0">
    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Usługi Klienta</h3>
    <span class="px-2 py-0.5 bg-[#1F293D] text-xs font-semibold text-gray-300 rounded border border-[#2B3B57]">
        {{ len .Services }}
    </span>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-2">
    {{ range .Services }}
    <button hx-get="/services/{{ .ServiceID }}" 
            hx-target="#workspace-container" 
            hx-indicator="#workspace-indicator-{{ .ServiceID }}"
            class="w-full text-left p-3.5 rounded-xl border border-transparent hover:border-[#23314B] hover:bg-[#161F30]/50 transition duration-150 flex items-center justify-between group active:scale-[0.98] outline-none">
        <div class="flex flex-col gap-1 min-w-0 pr-2">
            <span class="font-semibold text-gray-200 group-hover:text-white transition truncate text-sm">
                {{ .ServiceName }}
            </span>
            {{ if .PendingCount }}
            <span class="text-xs text-indigo-400 font-medium">
                {{ .PendingCount }} do weryfikacji
            </span>
            {{ end }}
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <!-- indicator -->
            <div id="workspace-indicator-{{ .ServiceID }}" class="htmx-indicator">
                <svg class="animate-spin h-4 w-4 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
            
            <span id="counter-{{ .ServiceID }}" class="px-2 py-1 rounded-lg text-xs font-bold font-mono tracking-wider {{ if ge .ApprovedCount .RequiredCount }} bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 {{ else }} bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 {{ end }}">
                {{ .ApprovedCount }} / {{ .RequiredCount }}
            </span>
        </div>
    </button>
    {{ end }}
</div>
{{ end }}
