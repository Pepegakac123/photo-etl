{{ if .Error }}
<script>
    showToast("Błąd generowania AI: {{ .Error }}", "error");
</script>
{{ else }}
    <!-- Remove placeholder out-of-band if it exists on first load -->
    <div id="ai-placeholder" hx-swap-oob="delete"></div>

    {{ range .Results }}
    <div class="aspect-video relative group rounded-xl overflow-hidden border border-[#23314B] bg-black glow animate-fadeIn">
        <img src="/local-media?path={{ urlEscape .Path }}" alt="Generated Image" class="object-cover w-full h-full group-hover:scale-105 transition duration-200">
        <div class="absolute bottom-2 left-2 right-2 bg-black/75 px-2 py-1.5 rounded text-[10px] text-gray-300 font-sans line-clamp-2 select-none group-hover:opacity-0 transition duration-150 border border-gray-800 pointer-events-none z-10">
            {{ .Prompt }}
        </div>
        <button hx-post="/photos/add?service_id={{ $.ServiceID }}&path={{ urlEscape .Path }}&source=AI&title={{ urlEscape .Prompt }}" 
                hx-target="#project-photos-container"
                onclick="this.closest('.relative').style.display='none';"
                class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition duration-150 flex items-center justify-center text-white text-xs font-bold font-sans z-20">
            Zaakceptuj i dodaj
        </button>
    </div>
    {{ end }}
{{ end }}

<script>
    document.querySelectorAll('.ai-skeleton').forEach(el => el.remove());
</script>
