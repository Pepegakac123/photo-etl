<!DOCTYPE html>
<html lang="pl" class="h-full bg-[#0B0F19]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow Photo ETL</title>
    <!-- Outfit & Plus Jakarta Sans Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(22, 31, 48, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(35, 49, 75, 0.6);
        }
        .glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }
        .glow-hover:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.35);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1F2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }
    </style>
</head>
<body class="h-full text-gray-200 flex flex-col font-sans selection:bg-indigo-500 selection:text-white">
    <!-- Topbar -->
    <header class="h-16 shrink-0 glass border-b border-[#23314B] flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <span class="p-2 bg-indigo-600 rounded-lg text-white font-extrabold glow select-none">
                OP
            </span>
            <div>
                <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-400 bg-clip-text text-transparent">
                    Overflow Photo ETL
                </h1>
                <p class="text-xs text-indigo-400 font-medium tracking-wide uppercase">Asset Manager & Optimizer</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button hx-get="/settings" 
                    hx-target="#workspace-container"
                    hx-indicator="#global-indicator" 
                    class="px-4 py-2 bg-[#161F30]/80 hover:bg-[#1E2B44] text-gray-200 border border-[#2B3B57] font-semibold rounded-lg shadow-md transition duration-200 text-sm flex items-center gap-2 select-none active:scale-[0.98]">
                <svg class="w-4.5 h-4.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
                <span>Konfiguracja & Koszty</span>
            </button>
            <button hx-post="/export" 
                    hx-target="#workspace-container"
                    hx-indicator="#global-indicator" 
                    class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold rounded-lg shadow-md hover:shadow-indigo-500/20 transition duration-200 glow-hover text-sm flex items-center gap-2">
                <span>Eksportuj do GoPress</span>
                <!-- spinner -->
                <svg id="global-indicator" class="animate-spin h-4 w-4 text-white htmx-indicator" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex flex-1 min-h-0">
        <!-- Sidebar -->
        <aside id="sidebar-container" class="w-80 shrink-0 bg-[#0F1422] border-r border-[#23314B] flex flex-col min-h-0">
            {{ template "sidebar" . }}
        </aside>

        <!-- Main workspace -->
        <main id="workspace-container" class="flex-1 bg-[#090D16] overflow-y-auto p-8 relative min-h-0">
            <div class="h-full flex flex-col items-center justify-center text-center p-8">
                <div class="w-20 h-20 bg-indigo-600/10 border border-indigo-500/20 rounded-full flex items-center justify-center mb-6 glow animate-pulse">
                    <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-white mb-2">Rozpocznij procesowanie</h2>
                <p class="text-sm text-gray-400 max-w-md">
                    Wybierz usługę z panelu bocznego, aby zobaczyć istniejące zdjęcia, zweryfikować braki lub pozyskać nowe za pomocą lokalnej galerii, banku zdjęć Envato lub sztucznej inteligencji.
                </p>
            </div>
        </main>
    </div>
</body>
</html>
